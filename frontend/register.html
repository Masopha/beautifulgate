<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Beautiful Gate Lesotho</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --brown:        #5C3D2E;
      --brown-dark:   #3E2A1E;
      --brown-light:  #8B6355;
      --orange:       #E8843A;
      --orange-light: #F4A65A;
      --orange-pale:  #FDF0E4;
      --teal:         #3DB8C1;
      --teal-dark:    #2A8A92;
      --teal-pale:    #E4F7F8;
      --off-white:    #FAF8F5;
      --text-dark:    #2D1E16;
      --text-mid:     #6B4E3D;
      --text-light:   #A07860;
      --shadow-md:    0 8px 32px rgba(92,61,46,0.14);
      --shadow-lg:    0 20px 60px rgba(92,61,46,0.18);
      --transition:   0.4s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--brown-dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: -120px; right: -120px;
      width: 480px; height: 480px;
      background: radial-gradient(circle, rgba(232,132,58,0.18) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px; left: -100px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(61,184,193,0.14) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .auth-wrap {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 460px;
    }
    .auth-brand {
      text-align: center;
      margin-bottom: 2rem;
    }
    .brand-logo {
      width: 72px; height: 72px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 1rem;
      border: 3px solid var(--orange);
      box-shadow: 0 0 0 6px rgba(232,132,58,0.15);
    }
    .brand-logo img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--orange-light);
    }
    .brand-name span { color: var(--teal); }
    .brand-sub { color: var(--brown-light); font-size: 0.82rem; margin-top: 0.3rem; }
    .auth-card {
      background: var(--off-white);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: var(--shadow-lg);
    }
    .auth-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--brown-dark);
      margin-bottom: 0.3rem;
    }
    .auth-card .sub {
      color: var(--text-light);
      font-size: 0.82rem;
      margin-bottom: 1.75rem;
    }
    .fg {
      margin-bottom: 1.1rem;
      display: flex;
      flex-direction: column;
    }
    .fg label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-mid);
      margin-bottom: 0.4rem;
    }
    .fg input {
      background: #fff;
      border: 2px solid #e0d5ce;
      border-radius: 8px;
      padding: 0.8rem 1rem;
      color: var(--text-dark);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      transition: var(--transition);
      width: 100%;
      outline: none;
    }
    .fg input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(232,132,58,0.12);
    }
    .fg .hint {
      font-size: 0.7rem;
      color: var(--text-light);
      margin-top: 0.3rem;
    }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 3rem; }
    .pw-toggle {
      position: absolute;
      right: 0.9rem; top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-light);
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 0;
      font-family: 'DM Sans', sans-serif;
    }
    .strength-bar {
      height: 4px;
      border-radius: 2px;
      margin-top: 0.4rem;
      background: #e0d5ce;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      width: 0%;
      border-radius: 2px;
      transition: width 0.3s, background 0.3s;
    }
    .strength-label {
      font-size: 0.68rem;
      color: var(--text-light);
      margin-top: 0.2rem;
    }
    .btn-auth {
      width: 100%;
      padding: 0.9rem;
      border: none;
      border-radius: 8px;
      background: var(--orange);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: var(--transition);
      margin-top: 0.5rem;
    }
    .btn-auth:hover { background: var(--orange-light); transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .error-msg {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #dc2626;
      font-size: 0.82rem;
      margin-bottom: 1rem;
      display: none;
    }
    .success-msg {
      background: var(--teal-pale);
      border: 1px solid rgba(61,184,193,0.4);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--teal-dark);
      font-size: 0.82rem;
      margin-bottom: 1rem;
      display: none;
    }
    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-light);
      font-size: 0.82rem;
    }
    .auth-footer a {
      color: var(--orange);
      font-weight: 600;
      text-decoration: none;
    }
    .auth-footer a:hover { color: var(--orange-light); }
  </style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-brand">
    <div class="brand-logo">
      <img src="images/logo1.jpeg" alt="Beautiful Gate" onerror="this.parentElement.style.background='var(--orange)';this.remove()"/>
    </div>
    <div class="brand-name">beautiful<span>gate</span></div>
    <p class="brand-sub">Lesotho &mdash; Create your account</p>
  </div>

  <div class="auth-card">
    <h2>Create Account</h2>
    <p class="sub">Fill in all fields to register. Already have an account? <a href="login.html">Sign in</a></p>

    <div class="error-msg"   id="err-msg"></div>
    <div class="success-msg" id="ok-msg"></div>

    <form id="reg-form" onsubmit="doRegister(event)" novalidate>
      <div class="fg">
        <label for="r-fullname">Full Name</label>
        <input type="text" id="r-fullname" placeholder="Your full name" required/>
      </div>
      <div class="fg">
        <label for="r-email">Email Address</label>
        <input type="email" id="r-email" placeholder="your@email.com" required/>
      </div>
      <div class="fg">
        <label for="r-username">Username</label>
        <input type="text" id="r-username" placeholder="Choose a username" required/>
        <span class="hint">Letters, numbers, underscores only. Min 4 characters.</span>
      </div>
      <div class="fg">
        <label for="r-password">Password</label>
        <div class="pw-wrap">
          <input type="password" id="r-password" placeholder="Create a password" required oninput="checkStrength(this.value)"/>
          <button type="button" class="pw-toggle" onclick="togglePw('r-password',this)">Show</button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        <div class="strength-label" id="strength-label"></div>
      </div>
      <button type="submit" class="btn-auth" id="reg-btn">Create Account</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign In</a>
    </div>
  </div>
</div>

<script>
(function(){
  var DEV  = 'http://localhost:3000';
  var PROD = 'https://beautifulgate-backend.onrender.com';
  window.API_BASE_URL = (location.hostname==='localhost'||location.hostname==='127.0.0.1') ? DEV : PROD;
})();
</script>
<script>
function togglePw(id, btn) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
  btn.textContent = el.type === 'password' ? 'Show' : 'Hide';
}
function checkStrength(pw) {
  const fill = document.getElementById('strength-fill');
  const lbl  = document.getElementById('strength-label');
  let score = 0;
  if (pw.length >= 8) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const colors = ['#ef4444','#f97316','#eab308','#22c55e'];
  const labels = ['Weak','Fair','Good','Strong'];
  fill.style.width    = (score * 25) + '%';
  fill.style.background = colors[score - 1] || 'transparent';
  lbl.textContent     = score > 0 ? labels[score - 1] : '';
}
function showErr(msg) {
  const el = document.getElementById('err-msg');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('ok-msg').style.display = 'none';
}
function showOk(msg) {
  const el = document.getElementById('ok-msg');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('err-msg').style.display = 'none';
}
async function doRegister(e) {
  e.preventDefault();
  const btn      = document.getElementById('reg-btn');
  const fullName = document.getElementById('r-fullname').value.trim();
  const email    = document.getElementById('r-email').value.trim();
  const username = document.getElementById('r-username').value.trim().toLowerCase();
  const password = document.getElementById('r-password').value;

  if (!fullName || !email || !username || !password) { showErr('Please fill in all fields.'); return; }
  if (!/^[a-z0-9_]{4,}$/.test(username)) { showErr('Username must be at least 4 characters — letters, numbers, underscores only.'); return; }
  if (password.length < 6) { showErr('Password must be at least 6 characters.'); return; }

  btn.disabled = true;
  btn.textContent = 'Creating account...';

  try {
    const res  = await fetch(window.API_BASE_URL + '/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ fullName, email, username, password })
    });
    const data = await res.json();
    if (data.success) {
      showOk('Account created! Redirecting to login...');
      setTimeout(() => { window.location.href = 'login.html'; }, 2000);
    } else {
      showErr(data.message || 'Registration failed.');
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  } catch (err) {
    showErr('Cannot connect to server.');
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
}
</script>
</body>
</html>
